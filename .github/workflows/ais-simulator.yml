name: AIS Fleet Simulator
on:
  # schedule:
  #   - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  simulate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run AIS Simulator
        run: node scripts/simulate-ais.js

      - name: Commit and push
        run: |
          git config user.name "AIS Simulator Bot"
          git config user.email "ais@autonomousship.org"
          git add ais-data.json scripts/ais-state.json
          git diff --staged --quiet || git commit -m "🚢 AIS update: $(date -u +'%Y-%m-%d %H:%M') UTC"
          git push
